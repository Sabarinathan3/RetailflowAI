<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RetailFlow AI - Smart retail management platform for modern businesses" />
    <title>RetailFlow AI</title>
    <script>
      try {
        const uiState = localStorage.getItem('retailflow-ui');
        if (uiState) {
          const parsed = JSON.parse(uiState);
          if (parsed.state && parsed.state.theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } else {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
